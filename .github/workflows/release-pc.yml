name: "Release PC App (Windows)"

on:
  # Déclenché manuellement depuis l'onglet Actions de GitHub
  workflow_dispatch:
    inputs:
      version:
        description: "Version (ex: 1.0.1)"
        required: true
        default: "1.0.0"
      release_notes:
        description: "Notes de version"
        required: false
        default: "Nouvelle version de Atilfaz IPTV pour PC"

  # Ou automatiquement quand vous poussez un tag v*.*.*
  push:
    tags:
      - "v*.*.*"

jobs:
  build-windows:
    name: "Build Windows — Application portable"
    runs-on: windows-latest

    steps:
      # 1. Récupérer le code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Installer Java 17 (nécessaire pour compiler)
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # 3. Télécharger gradle-wrapper.jar (non versionné dans le repo)
      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar `
            "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar"
        shell: pwsh

      # 4. Cache Gradle pour accélérer les builds suivants
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: gradle-${{ runner.os }}-

      # 5. Compiler l'application PC (app autonome avec JRE intégré)
      - name: Build PC App (createDistributable)
        run: ./gradlew :desktopApp:createDistributable --no-daemon
        shell: bash
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx2g"

      # 5. Zipper le dossier pour distribution
      - name: Zip distributable
        run: |
          cd desktopApp/build/compose/binaries/main/app
          Compress-Archive -Path "AtilfazIPTV" -DestinationPath "${{ github.workspace }}/AtilfazIPTV-Windows-Portable.zip"
        shell: pwsh

      # 6. Aussi créer le JAR portable (nécessite Java chez le client)
      - name: Build JAR portable
        run: ./gradlew :desktopApp:packageUberJarForCurrentOS --no-daemon
        shell: bash
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx2g"

      # 7. Trouver le JAR généré
      - name: Find JAR
        id: find_jar
        run: |
          $jar = Get-ChildItem -Path "desktopApp/build/compose/jars/*.jar" | Select-Object -First 1
          echo "jar_path=$($jar.FullName)" >> $env:GITHUB_OUTPUT
          echo "jar_name=$($jar.Name)" >> $env:GITHUB_OUTPUT
        shell: pwsh

      # 8. Déterminer la version du release
      - name: Get version
        id: version
        run: |
          if ("${{ github.event_name }}" -eq "push") {
            $ver = "${{ github.ref_name }}" -replace "^v", ""
          } else {
            $ver = "${{ github.event.inputs.version }}"
          }
          echo "tag=v$ver" >> $env:GITHUB_OUTPUT
          echo "version=$ver" >> $env:GITHUB_OUTPUT
        shell: pwsh

      # 9. Créer le GitHub Release et uploader les fichiers
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Atilfaz IPTV v${{ steps.version.outputs.version }} — PC Windows"
          body: |
            ## Atilfaz IPTV v${{ steps.version.outputs.version }} — Version PC Windows

            ${{ github.event.inputs.release_notes || 'Nouvelle version disponible.' }}

            ---

            ### Téléchargement

            | Fichier | Description |
            |---|---|
            | **AtilfazIPTV-Windows-Portable.zip** | ✅ Recommandé — Aucune installation, aucun Java requis |
            | **AtilfazIPTV-windows-x64-*.jar** | Alternative — Nécessite Java 17+ installé |

            ---

            ### Instructions (ZIP Portable — Recommandé)

            1. Téléchargez `AtilfazIPTV-Windows-Portable.zip`
            2. Décompressez le fichier où vous voulez
            3. Ouvrez le dossier `AtilfazIPTV`
            4. Double-cliquez sur `AtilfazIPTV.exe`
            5. Installez **VLC** si ce n'est pas déjà fait → [videolan.org/vlc](https://www.videolan.org/vlc/)
            6. Connectez-vous avec vos identifiants Xtream Codes

            ### Instructions (JAR — alternative)

            1. Installez Java 17 → [adoptium.net](https://adoptium.net/)
            2. Téléchargez le fichier `.jar`
            3. Double-cliquez dessus (ou `java -jar AtilfazIPTV-*.jar`)

            ---
            *Généré automatiquement par GitHub Actions*
          draft: false
          prerelease: false
          files: |
            AtilfazIPTV-Windows-Portable.zip
            ${{ steps.find_jar.outputs.jar_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
