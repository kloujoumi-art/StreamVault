name: Build StreamVault APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Java 17 ─────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Setup Gradle ────────────────────────────────────────────────────
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.4"

      # ── 4. Download gradle-wrapper.jar ────────────────────────────────────
      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar"
          chmod +x gradlew

      # ── 5. Cache ───────────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # ── 6. Build Debug APK ─────────────────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx2g"

      # ── 7. Build Release APK ───────────────────────────────────────────────
      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx2g"

      # ── 8. Rename APKs with clean names ───────────────────────────────────
      - name: Rename APK files
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk ATILFAZ-debug.apk
          cp app/build/outputs/apk/release/app-release-unsigned.apk ATILFAZ-release-unsigned.apk

      # ── 9. Get version name ────────────────────────────────────────────────
      - name: Get version info
        id: version
        run: |
          VERSION=$(grep "versionName" app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      # ── 10. Upload Debug APK (artifact) ───────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ATILFAZ-v${{ steps.version.outputs.version }}-debug
          path: ATILFAZ-debug.apk
          retention-days: 30

      # ── 11. Publish to GitHub Release (latest) ─────────────────────────────
      - name: Delete existing latest release
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create latest Release with APK
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "ATILFAZ v${{ steps.version.outputs.version }} — Latest"
          body: |
            ## ATILFAZ — Application Streaming Premium

            **Version:** ${{ steps.version.outputs.version }}
            **Date:** ${{ steps.version.outputs.date }}

            ---

            ### Télécharger via Downloader (Firestick / Android TV)
            Entrez ce code dans Downloader :

            **URL directe :**
            ```
            https://github.com/kloujoumi-art/StreamVault/releases/download/latest/ATILFAZ-debug.apk
            ```

            ---

            ### Installation sur téléphone Android
            1. Télécharge **ATILFAZ-debug.apk**
            2. Paramètres → Sécurité → **Sources inconnues** ✅
            3. Ouvre le fichier APK

            ### Compatible
            - Android 8.0+
            - Android TV / Firestick
            - Serveurs Xtream Codes (M3U)
          files: |
            ATILFAZ-debug.apk
            ATILFAZ-release-unsigned.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 12. Summary ────────────────────────────────────────────────────────
      - name: Build Summary
        run: |
          echo "## ATILFAZ Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** ${{ steps.version.outputs.date }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### URL Downloader (Firestick / Android TV)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "https://github.com/kloujoumi-art/StreamVault/releases/download/latest/ATILFAZ-debug.apk" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
